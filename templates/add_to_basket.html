{% extends "base.html" %}
{% block content %}
    <h1>Добавить в корзину</h1>
        <form method="post" action="{% url 'add_to_basket' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Добавить в корзину">
    </form>
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}
    <p>
        <input value="На главную" type="button" onclick="location.href='{% url "home" %}'"/>
    </p>
{% endblock %}
