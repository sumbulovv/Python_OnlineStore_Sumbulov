{% extends "base.html" %}
{% block content %}
    <h1>Список категорий</h1>
    <ul>
    {% for category in categories %}
    <li>{{ category.name }}</li>
    {% endfor %}
    </ul>
    {% if request.user.is_staff %}
        <p>
            <input value="Добавить категорию" type="button" onclick="location.href='{% url "add_category" %}'"/>
        </p>
    {% endif %}
    <p>
        <input value="На главную" type="button" onclick="location.href='{% url "home" %}'"/>
    </p>
{% endblock %}
