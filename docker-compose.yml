version: '3.8'
services:
  db:
    image: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: online_store
    volumes:
      - db-data:/var/lib/postgresql/
    networks:
      - online_store
  web:
    build: .
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: online_store
      POSTGRES_HOST: db
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --no-input &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - online_store

volumes:
  db-data:
networks:
  online_store: